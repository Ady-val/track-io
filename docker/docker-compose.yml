services:
  postgres:
    image: postgres:15-alpine
    container_name: track_io_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-track_io}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - track_io_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend-receptor
      dockerfile: ../docker/Dockerfile.backend
    container_name: track_io_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_NAME: ${POSTGRES_DB:-track_io}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-track_io}
      CORS_ORIGIN: '*'
      # Modbus configuration (set in docker .env or inline)
      MODBUS_HOST: ${MODBUS_HOST:-192.168.0.1}
      MODBUS_PORT: ${MODBUS_PORT:-502}
      MODBUS_UNIT_ID: ${MODBUS_UNIT_ID:-1}
      MODBUS_ZERO_BASED_REGISTERS: ${MODBUS_ZERO_BASED_REGISTERS:-true}
      MODBUS_VERIFY_WRITE: ${MODBUS_VERIFY_WRITE:-false}
      # Events webhook (Node-RED or other webhook endpoint)
      EVENTS_WEBHOOK_URL: ${EVENTS_WEBHOOK_URL:-http://host.docker.internal:1880/events}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - track_io_network

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
    container_name: track_io_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - track_io_network

volumes:
  postgres_data:

networks:
  track_io_network:
    driver: bridge