services:
  postgres:
    image: postgres:15-alpine
    container_name: track_io_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-track_io}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"  # Exponer PostgreSQL para desarrollo local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - track_io_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend-receptor
      dockerfile: ../docker/Dockerfile.backend
    container_name: track_io_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_NAME: ${POSTGRES_DB:-track_io}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-track_io}
      CORS_ORIGIN: '*'
    ports:
      - "0.0.0.0:3000:3000"  # Exponer en todas las interfaces de red para acceso remoto
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - track_io_network

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}  # URL del backend para los frontends
    container_name: track_io_nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"  # Exponer en todas las interfaces de red para acceso remoto
    depends_on:
      - backend
    networks:
      - track_io_network

volumes:
  postgres_data:

networks:
  track_io_network:
    driver: bridge