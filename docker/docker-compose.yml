services:
  postgres:
    image: postgres:15-alpine
    container_name: track_io_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-track_io}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"  # Exponer PostgreSQL para desarrollo local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - track_io_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend-receptor
      dockerfile: ../docker/Dockerfile.backend
    container_name: track_io_backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NODE_RED_EVENTS_URL: ${NODE_RED_EVENTS_URL:-http://host.docker.internal:1880/events}
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_NAME: ${POSTGRES_DB:-track_io}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-track_io}
      CORS_ORIGIN: '*'
      MODULE_MEASUREMENTS_ENABLED: ${MODULE_MEASUREMENTS_ENABLED:-true}
      MODULE_SIGNALS_ENABLED: ${MODULE_SIGNALS_ENABLED:-true}
      # Análisis de patrones con IA en Reportes (llama a la API de Anthropic:
      # tiene costo por llamada). Apagado por defecto; ver §6 de la spec.
      MODULE_INSIGHTS_ENABLED: ${MODULE_INSIGHTS_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-5}
      INSIGHTS_MAX_TOKENS: ${INSIGHTS_MAX_TOKENS:-4000}
      INSIGHTS_MAX_RANGE_DAYS: ${INSIGHTS_MAX_RANGE_DAYS:-90}
      INSIGHTS_TOP_SIGNALS: ${INSIGHTS_TOP_SIGNALS:-10}
      INSIGHTS_CACHE_TTL_MINUTES: ${INSIGHTS_CACHE_TTL_MINUTES:-1440}
      # Umbral de "muestra chica": por debajo de esto, se avisa que los
      # hallazgos pueden estar dominados por casos aislados.
      INSIGHTS_MIN_SAMPLE: ${INSIGHTS_MIN_SAMPLE:-20}
      # Zona horaria IANA de la planta. Las horas de los paros programados son
      # hora de PARED de la planta; sin esto una ventana de "12:00" se
      # resolvería a las 06:00. Una zona inválida hace fallar el arranque.
      PLANT_TIMEZONE: ${PLANT_TIMEZONE:-America/Mexico_City}
      # Usuario admin inicial (lo siembra la migración CreateAdminUser). Cambiar en prod.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-ADMIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    ports:
      # Publicado para que otros servicios del mismo server llamen al backend por endpoints.
      - "0.0.0.0:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Sin curl/wget en la imagen: usamos node para consultar /health.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - track_io_network
    # Migrations should be run manually if needed, or use synchronize in development

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.unified
      args:
        # Vacío por defecto: los frontends usan rutas relativas al mismo origen
        # (nginx proxea /api y /socket.io al backend). No requiere IP fija.
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: track_io_nginx
    restart: always
    ports:
      - "0.0.0.0:80:80"  # Único punto de entrada del frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - track_io_network

volumes:
  postgres_data:

networks:
  track_io_network:
    driver: bridge