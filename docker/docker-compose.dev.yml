# Docker Compose for Local Development
# This file extends docker-compose.yml with development-specific settings
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d postgres

services:
  postgres:
    container_name: track_iq_dev_postgres
    environment:
      # Override database name for development
      # Development uses: track_iq_dev
      # Production uses: track_io (from docker-compose.yml)
      POSTGRES_DB: ${POSTGRES_DB:-track_iq_dev}
    volumes:
      # Use separate volume for development to avoid conflicts with production
      # This replaces the postgres_data volume from docker-compose.yml
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  # Development volume (separate from production)
  postgres_dev_data:

