services:
  track_io_sql_server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: track-io-sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrongPassword123!}
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"  # Exponer SQL Server en puerto 1434 (host) -> 1433 (container)
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - track_io_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ../../backend-receptor
      dockerfile: ../docker/Dockerfile.backend
      # Linux: build con red del host (DNS/registry igual que el servidor). Suele corregir EAI_AGAIN si daemon.json no alcanza.
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
    container_name: track_io_backend_sqlserver
    restart: always
    command: >
      sh -c "node scripts/ensure-mssql-database.js && echo '🔄 Running database migrations...' && node scripts/run-migrations-docker.js && echo '🚀 Starting application...' && node --experimental-global-webcrypto dist/main.js"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Node-RED on the Docker host: use LAN IP if host.docker.internal fails (Linux).
      NODE_RED_EVENTS_URL: ${NODE_RED_EVENTS_URL:-http://host.docker.internal:1880/events}
      PORT: 3000
      DATABASE_TYPE: mssql
      DATABASE_HOST: track_io_sql_server
      DATABASE_PORT: 1433
      DATABASE_USERNAME: sa
      DATABASE_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrongPassword123!}
      DATABASE_NAME: ${MSSQL_DB:-track_io}
      DATABASE_URL: mssql://sa:${MSSQL_SA_PASSWORD:-YourStrongPassword123!}@track_io_sql_server:1433/${MSSQL_DB:-track_io}
      CORS_ORIGIN: '*'
      MODULE_MEASUREMENTS_ENABLED: ${MODULE_MEASUREMENTS_ENABLED:-true}
      MODULE_SIGNALS_ENABLED: ${MODULE_SIGNALS_ENABLED:-true}
    ports:
      - "0.0.0.0:3000:3000"  # Exponer en todas las interfaces de red para acceso remoto
    depends_on:
      track_io_sql_server:
        condition: service_healthy
    networks:
      - track_io_network
    # Migrations should be run manually if needed, or use synchronize in development

  nginx:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.unified
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_AUTH_TOKEN: ${VITE_AUTH_TOKEN:-}
    container_name: track_io_nginx_sqlserver
    restart: always
    ports:
      - "0.0.0.0:80:80"  # Exponer en todas las interfaces de red para acceso remoto
    depends_on:
      - backend
    networks:
      - track_io_network

volumes:
  sqlserver_data:

networks:
  track_io_network:
    driver: bridge
