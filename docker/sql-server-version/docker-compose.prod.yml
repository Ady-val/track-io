# Track.IO - Docker Compose para Producción (Backend + Nginx)
# SQL Server debe estar corriendo por separado en la red track_iq_production_sql_server

services:
  backend:
    build:
      context: ../../backend-receptor
      dockerfile: ../docker/Dockerfile.backend
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: track_io_backend_prod
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      NODE_RED_EVENTS_URL: ${NODE_RED_EVENTS_URL:-http://host.docker.internal:1880/events}
      PORT: 3000
      DATABASE_TYPE: mssql
      DATABASE_HOST: ${DATABASE_HOST_PROD:-track-io-sqlserver-prod}
      DATABASE_PORT: 1433
      DATABASE_USERNAME: ${MSSQL_USER_PROD:-sa}
      DATABASE_PASSWORD: ${MSSQL_SA_PASSWORD_PROD}
      DATABASE_NAME: ${MSSQL_DB_PROD:-track_io_prod}
      DATABASE_URL: mssql://${MSSQL_USER_PROD:-sa}:${MSSQL_SA_PASSWORD_PROD}@${DATABASE_HOST_PROD:-track-io-sqlserver-prod}:1433/${MSSQL_DB_PROD:-track_io_prod}
      CORS_ORIGIN: ${CORS_ORIGIN_PROD:-*}
      MODULE_MEASUREMENTS_ENABLED: ${MODULE_MEASUREMENTS_ENABLED:-true}
      MODULE_SIGNALS_ENABLED: ${MODULE_SIGNALS_ENABLED:-true}
      MSSQL_ENCRYPT: ${MSSQL_ENCRYPT_PROD:-true}
      MSSQL_TRUST_SERVER_CERTIFICATE: ${MSSQL_TRUST_SERVER_CERTIFICATE_PROD:-false}
      TYPEORM_SYNCHRONIZE: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "0.0.0.0:${BACKEND_PORT_PROD:-3000}:3000"
    networks:
      - track_iq_production_sql_server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  nginx_prod:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.unified
      args:
        VITE_API_URL: ${VITE_API_URL_PROD:-http://localhost:3000}
        VITE_AUTH_TOKEN: ${VITE_AUTH_TOKEN_PROD:-}
    container_name: track_io_nginx_prod
    restart: unless-stopped
    ports:
      - "0.0.0.0:${NGINX_PORT_PROD:-80}:80"
      - "0.0.0.0:${NGINX_SSL_PORT_PROD:-443}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - track_iq_production_sql_server
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  track_iq_production_sql_server:
    external: true
